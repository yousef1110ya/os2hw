ServerName os2.com
ServerRoot "/usr/local/apache2"

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_balancer_module modules/mod_proxy_balancer.so
LoadModule slotmem_shm_module modules/mod_slotmem_shm.so
LoadModule lbmethod_byrequests_module modules/mod_lbmethod_byrequests.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule headers_module modules/mod_headers.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule unixd_module modules/mod_unixd.so

# Global directives
ErrorLog "/shared-logs/error.log"

# JSON log format with full request metadata
LogFormat "{ \
  \"timestamp\":\"%{%Y-%m-%dT%H:%M:%S}t\", \
  \"client_ip\":\"%a\", \
  \"method\":\"%m\", \
  \"path\":\"%U\", \
  \"query\":\"%q\", \
  \"protocol\":\"%H\", \
  \"status\":%>s, \
  \"bytes_sent\":%B, \
  \"duration_ms\":%{ms}T, \
  \"referer\":\"%{Referer}i\", \
  \"user_agent\":\"%{User-Agent}i\", \
  \"host\":\"%{Host}i\", \
  \"content_type\":\"%{Content-Type}i\", \
  \"content_length\":\"%{Content-Length}i\", \
  \"authorization\":\"%{Authorization}i\", \
  \"x_forwarded_for\":\"%{X-Forwarded-For}i\", \
  \"x_request_id\":\"%{X-Request-ID}i\" \
}" json_log

# SSL session cache must be global, not inside VirtualHost
SSLSessionCache        shmcb:/usr/local/apache2/logs/ssl_scache(512000)
SSLSessionCacheTimeout 300

Listen 443

<VirtualHost *:443>
    ServerName os2.com

    SSLEngine on
    SSLCertificateFile    "/usr/local/apache2/conf/server.crt"
    SSLCertificateKeyFile "/usr/local/apache2/conf/server.key"
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   on

    CustomLog "/shared-logs/access.log" json_log

    ProxyPreserveHost On

    <Proxy "balancer://java-cluster">
        BalancerMember http://app1:8080
        BalancerMember http://app2:8080
        ProxySet lbmethod=byrequests
    </Proxy>

    ProxyPass        "/" "balancer://java-cluster/"
    ProxyPassReverse "/" "balancer://java-cluster/"
</VirtualHost>
