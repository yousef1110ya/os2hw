global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-cluster
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - app1:8080
          - app2:8080
        labels:
          environment: os2-compose

  - job_name: ai_classifier
    static_configs:
      - targets:
          - ai-classifier:8000

  - job_name: apache
    static_configs:
      - targets:
          - apache-exporter:9117

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
