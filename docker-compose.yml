name: ecommerce-stack

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: pass
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend
    restart: unless-stopped

  app1:
    image: birobyte1110/java-app:docker
    container_name: app1
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ecommerce_user
      SPRING_DATASOURCE_PASSWORD: ecommerce_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      APP_JWT_SECRET: docker_demo_secret_key_must_be_at_least_32_chars
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: pass
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MANAGEMENT_HEALTH_REDIS_ENABLED: "true"
      APP_INVENTORY_LOCK_TYPE: redis
      APP_CAPACITY_MAX_CONCURRENT_REQUESTS: 10
      APP_CAPACITY_MAX_WAIT_MS: 50
      APP_REQUEST_AUDIT_ENABLED: "true"
      APP_REQUEST_AUDIT_PATH: /shared-logs/request-audit.log
      APP_REQUEST_AUDIT_MAX_BODY_BYTES: 8192
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    expose:
      - "8080"
    volumes:
      - apache_logs:/shared-logs
    networks:
      - backend
    restart: unless-stopped

  app2:
    image: birobyte1110/java-app:docker
    container_name: app2
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: ecommerce_user
      SPRING_DATASOURCE_PASSWORD: ecommerce_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      APP_JWT_SECRET: docker_demo_secret_key_must_be_at_least_32_chars
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: pass
      SPRING_CACHE_TYPE: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MANAGEMENT_HEALTH_REDIS_ENABLED: "true"
      APP_INVENTORY_LOCK_TYPE: redis
      APP_CAPACITY_MAX_CONCURRENT_REQUESTS: 10
      APP_CAPACITY_MAX_WAIT_MS: 50
      APP_REQUEST_AUDIT_ENABLED: "true"
      APP_REQUEST_AUDIT_PATH: /shared-logs/request-audit.log
      APP_REQUEST_AUDIT_MAX_BODY_BYTES: 8192
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    expose:
      - "8080"
    volumes:
      - apache_logs:/shared-logs
    networks:
      - backend
    restart: unless-stopped

  apache:
    image: httpd:2.4
    container_name: apache
    ports:
      - "443:443"
      - "8081:8081"
    volumes:
      - ./apache:/usr/local/apache2/conf:ro
      - apache_logs:/shared-logs
    networks:
      - backend
    restart: unless-stopped
    # Ensure the container waits for the network to be ready
    depends_on:
      - app1
      - app2

  apache-exporter:
    container_name: apache-exporter
    image: lusotycoon/apache-exporter
    command: --scrape_uri=http://apache:8081/server-status?auto
    ports:
      - "9117:9117"    
    depends_on:
      - apache
    networks:
      - backend

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    privileged: true
    ports:
      - "12345:12345"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - ${DOCKER_ROOT_DIR:-/var/lib/docker}:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped


  ai-classifier:
    build: ./ai-classifier
    container_name: ai-classifier
    depends_on:
      - apache
    environment:
      REQUEST_AUDIT_LOG_PATH: /shared-logs/request-audit.log
    volumes:
      - apache_logs:/shared-logs
    ports:
      - "8000:8000"
    networks:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ai-classifier
      - apache-exporter
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

  traffic-generator:
    build: ./traffic-generator
    container_name: traffic-generator
    profiles:
      - demo
    environment:
      TARGET_URL: https://apache
      CONCURRENCY: 80
      DURATION_SECONDS: 120
      VERIFY_TLS: "false"
    depends_on:
      - apache
    networks:
      - backend

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  alloy-data:
  apache_logs:

networks:
  backend:
